<!DOCTYPE html>
<html>
<head>
<title>Voided Studios Portal</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b12;
  color:white;
}

header {
  background:#151520;
  padding:15px;
}

.card {
  background:#161625;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
button {
  padding:10px;
  margin:10px;
  background:#5c6cff;
  border:none;
  color:white;
  border-radius:6px;
}
</style>
</head>

<body>

<header>🟣 Voided Studios Portal (Local Cache Enabled)</header>

<button onclick="enableNotifs()">🔔 Enable Notifications</button>
<button onclick="clearCache()">🧹 Clear Local Cache</button>

<h2 style="padding:10px;">🔔 Notifications</h2>
<div id="feed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "voidedstudios-admin.firebaseapp.com",
  projectId: "voidedstudios-admin"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔔 NOTIFICATIONS PERMISSION */
window.enableNotifs = () => {
  Notification.requestPermission();
};

/* 🧠 LOCAL STORAGE LOAD */
function loadCache() {
  const data = JSON.parse(localStorage.getItem("notifications") || "[]");
  render(data);
}

/* 💾 SAVE TO LOCAL STORAGE */
function saveCache(data) {
  localStorage.setItem("notifications", JSON.stringify(data));
}

/* 🧹 CLEAR CACHE */
window.clearCache = () => {
  localStorage.removeItem("notifications");
  feed.innerHTML = "";
};

/* 🪟 WINDOWS POPUP */
function popup(title, body) {
  if (Notification.permission === "granted") {
    new Notification(title, { body });
  }
}

/* 🎨 RENDER */
function render(list) {
  let html = "";

  list.forEach(n => {
    let icon = "🔔";
    if (n.type === "warning") icon = "⚠️";
    if (n.type === "strike") icon = "🔴";
    if (n.type === "promotion") icon = "⬆️";

    html += `
      <div class="card">
        ${icon} <b>${n.name}</b><br>
        ${n.message}
      </div>
    `;
  });

  feed.innerHTML = html;
}

/* 🚀 FIREBASE + SYNC */
onSnapshot(collection(db,"notifications"), snap => {

  let list = [];

  snap.forEach(doc => {
    const n = doc.data();
    list.push(n);
  });

  // 💾 SAVE TO LOCAL STORAGE
  saveCache(list);

  // 🖥️ RENDER
  render(list);

  // 🪟 POPUP ONLY FOR NEW ITEMS
  snap.docChanges().forEach(change => {
    if (change.type === "added") {
      const n = change.doc.data();

      let text = "";

      if (n.type === "warning") text = "⚠️ WARNING: " + n.message;
      if (n.type === "strike") text = "🔴 STRIKE: " + n.message;
      if (n.type === "promotion") text = "⬆️ PROMOTION: " + n.message;

      popup("Voided Studios", text);
    }
  });

});

/* 📦 LOAD CACHE ON START */
loadCache();

</script>

</body>
</html>
