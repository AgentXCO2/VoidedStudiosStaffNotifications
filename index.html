<!DOCTYPE html>
<html>
<head>
<title>Voided Studios Portal</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b12;
  color:white;
}

header {
  background:#151520;
  padding:15px;
}

section {
  padding:20px;
}

.card {
  background:#161625;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

input, button {
  padding:10px;
  margin:5px;
}
button {
  background:#5c6cff;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>🟣 Voided Studios Portal</header>

<!-- LOGIN -->
<section id="loginBox">
  <h2>🔐 Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</section>

<!-- MAIN -->
<section id="main" style="display:none;">
  <h2>📡 Live Feed</h2>
  <button onclick="logout()">Logout</button>
  <div id="feed"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJ9-hLzsxyHsnxHNnohbl7uI4gCa8ELjk",
  authDomain: "voided-studios-core.firebaseapp.com",
  projectId: "voided-studios-core"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 🔐 LOGIN */
window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, pass.value);
};

/* 🚪 LOGOUT */
window.logout = () => {
  signOut(auth);
};

/* 👤 AUTH STATE */
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    main.style.display = "block";
  } else {
    loginBox.style.display = "block";
    main.style.display = "none";
  }
});

/* 📡 LIVE FEED */
onSnapshot(collection(db,"test"), snap => {

  let html = "";

  snap.forEach(doc => {
    const d = doc.data();

    html += `
      <div class="card">
        📄 ${d.message}<br>
        <small>${new Date(d.time).toLocaleString()}</small>
      </div>
    `;
  });

  feed.innerHTML = html;
});

</script>

</body>
</html>
