<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voided Studios - Notifications</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b0b12, #141428);
    color: white;
  }

  .topbar {
    background: #151520;
    padding: 10px;
    display: flex;
    justify-content: space-between;
  }

  .window {
    width: 85%;
    margin: 30px auto;
    background: #161625;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
  }

  .header {
    background: #5c6cff;
    padding: 10px;
    font-weight: bold;
  }

  .content {
    padding: 15px;
    max-height: 70vh;
    overflow-y: auto;
  }

  .notif {
    background: #1e1e33;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border-left: 4px solid #5c6cff;
  }

  .warning { border-left-color: orange; }
  .strike { border-left-color: red; }
  .promo { border-left-color: lime; }

  .small {
    font-size: 12px;
    opacity: 0.7;
  }

  button {
    padding: 10px;
    margin: 10px;
    background: #5c6cff;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="topbar">
  <div>🪟 Voided Studios Staff OS</div>
  <div>Notifications</div>
</div>

<button onclick="enableNotifs()">🔔 Enable Windows Notifications</button>

<div class="window">
  <div class="header">Live Notifications</div>
  <div class="content" id="notifList">Loading...</div>
</div>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  query
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDXOKJGcxkwJ-iPpIyVUHK2naYMNBBRfjs",
  authDomain: "voidedstudios-admin.firebaseapp.com",
  projectId: "voidedstudios-admin",
  storageBucket: "voidedstudios-admin.firebasestorage.app",
  messagingSenderId: "383785543622",
  appId: "1:383785543622:web:95bd79ceca7baecf1134c7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🪟 WINDOWS NOTIFICATION PERMISSION */
window.enableNotifs = function () {
  Notification.requestPermission().then(p => {
    alert("Notification permission: " + p);
  });
};

/* 🪟 WINDOWS POPUP FUNCTION */
function showWindowsNotification(title, body) {
  if (Notification.permission === "granted") {
    new Notification(title, {
      body: body,
      icon: "https://firebase.google.com/downloads/brand-guidelines/PNG/logo-logomark.png"
    });
  }
}

/* LIVE FIREBASE NOTIFICATIONS */
const q = query(collection(db, "notifications"));

onSnapshot(q, (snap) => {
  let html = "";

  snap.docChanges().forEach(change => {
    const n = change.doc.data();

    if (change.type === "added") {

      // 🪟 REAL WINDOWS POPUP
      showWindowsNotification(
        "Voided Studios",
        `${n.type.toUpperCase()}: ${n.message}`
      );
    }
  });

  snap.forEach(doc => {
    const n = doc.data();

    let typeClass = "";
    if (n.type === "warning") typeClass = "warning";
    if (n.type === "strike") typeClass = "strike";
    if (n.type === "promo") typeClass = "promo";

    html += `
      <div class="notif ${typeClass}">
        <b>${n.type.toUpperCase()}</b><br>
        ${n.message}<br>
        <span class="small">To: ${n.to}</span>
      </div>
    `;
  });

  document.getElementById("notifList").innerHTML = html;
});

</script>

</body>
</html>
