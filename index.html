<!DOCTYPE html>
<html>
<head>
<title>Voided Studios Portal</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b12;
  color:white;
}

header {
  background:#151520;
  padding:15px;
}

section {
  padding:20px;
}

input, button {
  padding:10px;
  margin:5px;
}

button {
  background:#5c6cff;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.card {
  background:#161625;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🟣 Voided Studios Portal</header>

<!-- LOGIN -->
<section id="loginBox">
  <h2>🔐 Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</section>

<!-- USERNAME SETUP -->
<section id="usernameBox" style="display:none;">
  <h2>👤 Set Your Username</h2>
  <input id="username" placeholder="Your Username"><br>
  <button onclick="saveUsername()">Save Username</button>
</section>

<!-- MAIN -->
<section id="main" style="display:none;">
  <h2>📡 Live Feed</h2>
  <button onclick="logout()">Logout</button>
  <div id="feed"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJ9-hLzsxyHsnxHNnohbl7uI4gCa8ELjk",
  authDomain: "voided-studios-core.firebaseapp.com",
  projectId: "voided-studios-core"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 🧠 LOGIN (FIXED) */
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, pass.value);
  } catch (e) {
    alert("Login failed: " + e.message);
  }
};

/* 🚪 LOGOUT */
window.logout = () => {
  signOut(auth);
  localStorage.removeItem("username");
};

/* 👤 SAVE USERNAME */
window.saveUsername = () => {
  localStorage.setItem("username", username.value);
  usernameBox.style.display = "none";
  main.style.display = "block";
};

/* 🔐 AUTH STATE CONTROL */
onAuthStateChanged(auth, (user) => {

  if (user) {

    loginBox.style.display = "none";

    const saved = localStorage.getItem("username");

    if (!saved) {
      usernameBox.style.display = "block";
    } else {
      main.style.display = "block";
    }

  } else {
    loginBox.style.display = "block";
    usernameBox.style.display = "none";
    main.style.display = "none";
  }

});

/* 📡 LIVE FEED */
onSnapshot(collection(db,"messages"), snap => {

  let html = "";

  snap.forEach(doc => {
    const d = doc.data();

    html += `
      <div class="card">
        📄 ${d.message}<br>
        <small>To: ${d.to}</small>
      </div>
    `;
  });

  feed.innerHTML = html;
});

</script>

</body>
</html>
