<!DOCTYPE html>
<html>
<head>
<title>Voided Studios</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b12;
  color:white;
}

header {
  background:#151520;
  padding:15px;
}

.card {
  background:#161625;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🟣 Voided Studios</header>

<section>
<h2>🔔 Notifications</h2>
<div id="notif"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "voidedstudios-admin.firebaseapp.com",
  projectId: "voidedstudios-admin"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LIVE NOTIFICATIONS */
onSnapshot(collection(db,"notifications"), snap => {
  let html = "";

  snap.forEach(d => {
    const n = d.data();

    let icon = "🔔";
    if (n.type === "warning") icon = "⚠️";
    if (n.type === "strike") icon = "🔴";
    if (n.type === "promotion") icon = "⬆️";

    html += `
      <div class="card">
        ${icon} <b>${n.name}</b><br>
        ${n.message}
      </div>
    `;
  });

  notif.innerHTML = html;
});

</script>

</body>
</html>
