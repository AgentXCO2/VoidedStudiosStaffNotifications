<!DOCTYPE html>
<html>
<head>
<title>Voided Studios Portal</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b12;
  color:white;
}

header {
  background:#151520;
  padding:15px;
  font-size:18px;
}

section {
  padding:20px;
}

.card {
  background:#161625;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

button {
  padding:10px;
  margin:5px;
  background:#5c6cff;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
🟣 Voided Studios — Main Portal
</header>

<section>

<h2>🔥 Firebase Test Panel</h2>

<button onclick="writeTest()">Write Test Data</button>

</section>

<section>

<h2>📡 Live Feed (future notifications)</h2>
<div id="feed">
No data yet...
</div>

</section>

<script type="module">

// =========================
// 🔥 FIREBASE IMPORTS
// =========================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

// =========================
// 🔧 FIREBASE CONFIG
// =========================
const firebaseConfig = {
  apiKey: "AIzaSyAJ9-hLzsxyHsnxHNnohbl7uI4gCa8ELjk",
  authDomain: "voided-studios-core.firebaseapp.com",
  projectId: "voided-studios-core",
  storageBucket: "voided-studios-core.firebasestorage.app",
  messagingSenderId: "1018633432201",
  appId: "1:1018633432201:web:44cbf872afee912516ea58"
};

// =========================
// 🚀 INIT
// =========================
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =========================
// 🧪 TEST WRITE FUNCTION
// =========================
window.writeTest = async () => {
  await addDoc(collection(db, "test"), {
    message: "Voided Studios connected!",
    time: Date.now()
  });

  alert("Saved to Firestore!");
};

// =========================
// 📡 LIVE LISTENER (READY)
// =========================
// This will be used later for:
// - warnings
// - strikes
// - promotions
// - notifications

onSnapshot(collection(db, "test"), (snap) => {

  let html = "";

  snap.forEach(doc => {
    const d = doc.data();

    html += `
      <div class="card">
        📄 ${d.message}<br>
        <small>${new Date(d.time).toLocaleString()}</small>
      </div>
    `;
  });

  feed.innerHTML = html;

});

</script>

</body>
</html>
